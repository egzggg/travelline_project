<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelLine Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>TravelLine Admin</h1>
        <a href="/" class="btn btn-outline-secondary">← На сайт</a>
      </div>
      <div class="card shadow-sm">
        <div class="card-body">
          <h5 class="mb-3">Разделы сайта</h5>
          <div class="list-group">
            {% for section in sections %}
              <a href="/admin/{{ section.slug }}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                <div>
                  <strong>{{ section.name }}</strong>
                </div>
                <span class="text-muted">→</span>
              </a>
            {% endfor %}
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
