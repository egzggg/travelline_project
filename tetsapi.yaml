openapi: 3.0.0 
info: 
    title: Тестовое АПИ 
    version: 0.0.1 
servers: 
    - url: http://localhost:8080/VK/v1/ 
      description: Test dev service 
paths:
    /users: 
        get: 
         summary: Получение всех пользователей 
         tags: 
            - Users 
         operationId: getAlluserss
         responses: 
            '200': 
                description: Успешный ответ 
                content: 
                    application/json: 
                      schema: 
                        $ref: '#/components/schemas/Users' 
            'default': 
              description: Что-то пошло не так 
              content: 
                application/json: 
                  schema: 
                    $ref: '#/components/schemas/Error' 
        post: 
          summary: Создание пользователя 
          tags: 
            - Users 
          operationId: createUser 
          requestBody: 
            required: true 
            content: 
              application/json: 
                schema: 
                  $ref: '#/components/schemas/User' 
          responses: 
            '200': 
                description: Успешно создали одного пользователя 
                content: 
                    application/json: 
                      schema: 
                        $ref: '#/components/schemas/User' 
            'default': 
              description: Что-то пошло не так при создании пользователя 
              content: 
                application/json: 
                  schema: 
                    $ref: '#/components/schemas/Error' 

    /users/{user_id}: 
        get: 
         summary: Получение пользователя 
         tags: 
            - Users 
         operationId: getUserById 
         parameters: 
           - name: user_id 
             in: path 
             required: true 
             description: Идентификатор пользователя 
             schema: 
                type: string 
                format: uuid 
                example: 7f3c2d9e-8b41-4f6a-a2c7-5e91d8b4c3f0 
         responses: 
            '200': 
                description: Успешный ответ для одного пользователя 
                content: 
                    application/json: 
                      schema: 
                        $ref: '#/components/schemas/User' 
            'default': 
              description: Что-то пошло не так у одного пользователя 
              content: 
                application/json: 
                  schema: 
                    $ref: '#/components/schemas/Error' 
        delete: 
          summary: Удаление пользователя 
          tags: 
            - Users 
          operationId: deleteUserById 
          parameters: 
            - name: user_id 
              in: path 
              required: true 
              description: Идентификатор пользователя 
              schema:
                type: string
                format: uuid
                example: 7f3c2d9e-8b41-4f6a-a2c7-5e91d8b4c3f0
          responses:
            '200':
                description: Успешный ответ для одного пользователя
                content: 
                    application/json: 
                      schema: {}
            'default': 
              description: Что-то пошло не так при удалении пользователя
              content:
                application/json: 
                  schema:
                    $ref: '#/components/schemas/Error'   
    /user/{user_id}/friends:
        get:
          summary: Просмотр друзей пользователя
          tags:
            - Friends
          operationId: getAllfriends
          parameters: 
           - name: user_id
             in: path
             required: true
             description: Идентификатор пользователя
             schema:
                type: string
                format: uuid
                example: 7f3c2d9e-8b41-4f6a-a2c7-5e91d8b4c3f0
          responses:
            '200':
                description: Успешно вернул всех друзей
                content:
                    application/json: 
                      schema: 
                        $ref: '#/components/schemas/Friends'          
            'default': 
              description: Что-то пошло не так при удалении пользователя
              content:
                application/json: 
                  schema:
                    $ref: '#/components/schemas/Error'

        post:
          summary: Создание Друга
          tags:
            - Friends
          operationId: createFriend
          parameters: 
           - name: user_id
             in: path
             required: true
             description: Идентификатор пользователя
             schema:
                type: string
                format: uuid
                example: 7f3c2d9e-8b41-4f6a-a2c7-5e91d8b4c3f0
          requestBody: 
            required: true
            content:
              application/json: 
                schema:
                  $ref: '#/components/schemas/FriendReference'
          responses: 
            '200':
                description: Друг успешно добавлен
                content: 
                    application/json: 
                      schema: 
                        $ref: '#/components/schemas/FriendReference'
            'default': 
              description: Что-то пошло не так при создании друга
              content:
                application/json: 
                  schema:
                    $ref: '#/components/schemas/Error'  

    /user/{user_id}/chats:
        get:
          summary: Получить все чаты пользователя
          tags: 
            - Chats
          operationId: getAllChats
          parameters:
            - name: user_id
              in: path
              required: true
              description: Идентификатор пользователя
              schema:
                type: string
                format: uuid
                example: 7f3c2d9e-8b41-4f6a-a2c7-5e91d8b4c3f0
          responses:
            '200':
              description: Чаты успешно возвращены
              content: 
                application/json: 
                  schema: 
                    $ref: '#/components/schemas/Chats'
            'default': 
                description: Что-то пошло не так при создании друга
                content:
                  application/json: 
                    schema:
                        $ref: '#/components/schemas/Error' 
        post:
          summary: Создание чата
          tags:
            - Chats
          operationId: createChat
          parameters: 
            - name: user_id
              in: path
              required: true
              description: Идентификатор пользователя
              schema:
                type: string
                format: uuid
                example: 7f3c2d9e-8b41-4f6a-a2c7-5e91d8b4c3f0   
          requestBody: 
              required: true
              content:
                application/json: 
                  schema:
                    $ref: '#/components/schemas/ChatCreateRequest'
          responses: 
              '200':
                  description: Чат успешно добавлен
                  content: 
                      application/json: 
                        schema: 
                          $ref: '#/components/schemas/Chat'
              'default': 
                description: Что-то пошло не так при создании друга
                content:
                  application/json: 
                    schema:
                      $ref: '#/components/schemas/Error' 

    /user/{user_id}/chats/{chat_id}:
      get:
        summary: Вернуть чат
        tags: 
          - Chats
        operationId: getChatById         
        parameters: 
          - name: user_id
            in: path
            required: true
            description: Идентификатор пользователя
            schema:
              type: string
              format: uuid
              example: 7f3c2d9e-8b41-4f6a-a2c7-5e91d8b4c3f0
          - name: chat_id
            in: path
            required: true
            description: Идентификатор чата
            schema:
              type: string
              format: uuid
              example: 7f3c2d9e-8b41-4f6a-a2c7-5e91d8b4c3f0
        responses: 
          '200':
              description: Чат существует
              content: 
                application/json: 
                  schema: 
                    $ref: '#/components/schemas/Chat'
          '404':
            description: Чата не существут          
            content: 
              application/json: 
                schema: 
                  $ref: '#/components/schemas/Error'
          'default': 
                description: Что-то пошло не так
                content:
                  application/json: 
                    schema:
                        $ref: '#/components/schemas/Error'
      post:
        summary: Создание сообщения
        tags:
          - Chats
        operationId: createMassageByChat
        parameters: 
          - name: user_id
            in: path
            required: true
            description: Идентификатор пользователя
            schema:
              type: string
              format: uuid
              example: 7f3c2d9e-8b41-4f6a-a2c7-5e91d8b4c3f0   
          - name: chat_id
            in: path
            required: true
            description: Идентификатор чата
            schema:
              type: string
              format: uuid
              example: 7f3c2d9e-8b41-4f6a-a2c7-5e91d8b4c3f0       
        requestBody: 
              required: true
              content:
                application/json: 
                  schema:
                    $ref: '#/components/schemas/MassageByChatRequest'
        responses: 
              '200':
                description: Чат успешно добавлен
                content: 
                  application/json: 
                    schema: 
                      $ref: '#/components/schemas/Chat'
              'default': 
                description: Что-то пошло не так при создании друга
                content:
                  application/json: 
                    schema:
                      $ref: '#/components/schemas/Error'                  
                        
    /user/{user_id}/posts:
        get:
         summary: Получение ленты пользователя 
         tags: 
            - Users 
         operationId: getPostsByUsrId 
         parameters: 
           - name: user_id 
             in: path 
             required: true 
             description: Идентификатор пользователя 
             schema: 
                type: string 
                format: uuid 
                example: 7f3c2d9e-8b41-4f6a-a2c7-5e91d8b4c3f0 
         responses: 
            '200': 
                description: Успешный ответ для одного пользователя 
                content: 
                    application/json: 
                      schema: 
                        $ref: '#/components/schemas/PostsResponse' 
            'default': 
              description: Что-то пошло не так
              content: 
                application/json: 
                  schema: 
                    $ref: '#/components/schemas/Error' 
        post: 
          summary: Создание поста 
          tags: 
            - Users
          operationId: createPostByUserID
          parameters: 
           - name: user_id
             in: path
             required: true
             description: Идентификатор пользователя
             schema:
                type: string
                format: uuid
                example: 7f3c2d9e-8b41-4f6a-a2c7-5e91d8b4c3f0
          requestBody: 
            required: true 
            content: 
              application/json: 
                schema: 
                  $ref: '#/components/schemas/Post' 
          responses: 
            '200': 
                description: Успешно создали пост пользователя 
                content: 
                    application/json: 
                      schema: 
                        $ref: '#/components/schemas/Post' 
            'default': 
              description: Что-то пошло не так при создании поста 
              content: 
                application/json: 
                  schema: 
                    $ref: '#/components/schemas/Error' 
    /user/{user_id}/posts/{post_id}/media:
        post: 
          summary: Создание медиа-файла 
          tags: 
            - Users
          operationId: createMediaFileByUserID
          parameters: 
           - name: user_id
             in: path
             required: true
             description: Идентификатор пользователя
             schema:
                type: string
                format: uuid
                example: 7f3c2d9e-8b41-4f6a-a2c7-5e91d8b4c3f0
           - name: post_id
             in: path
             required: true
             description: Идентификатор пользователя
             schema:
                type: string
                format: uuid
                example: 7f3c2d9e-8b41-4f6a-a2c7-5e91d8b4c3f0    
          requestBody: 
            required: true 
            content: 
              application/json: 
                schema: 
                  $ref: '#/components/schemas/MediaFileRequest' 
          responses: 
            '200': 
                description: Успешно создали медиа-файл поста
                content: 
                    application/json: 
                      schema: 
                        $ref: '#/components/schemas/MediaFileResponse' 
            'default': 
              description: Что-то пошло не так при создании медиа-файла 
              content: 
                application/json: 
                  schema: 
                    $ref: '#/components/schemas/Error' 

    /user/{user_id}/friends/{friend_id}:
        get:
          summary: Просмотреть существуеи ли такой друг
          tags:
            - Friends
          operationId: getIsFriendById
          parameters: 
           - name: user_id
             in: path
             required: true
             description: Идентификатор пользователя
             schema:
                type: string
                format: uuid
                example: 7f3c2d9e-8b41-4f6a-a2c7-5e91d8b4c3f0
           - name: friend_id
             in: path
             required: true
             description: Indentification friends 
             schema:
                type: string
                format: uuid
                example: 7f3c2d9e-8b41-4f6a-a2c7-5e91d8b4c3f0
          responses:
            '200':
                description: Друга найдеи
                content:
                    application/json: 
                      schema: 
                        $ref: '#/components/schemas/FriendStatus'
            '404': 
              description: Друг не найден
              content:
                application/json: 
                  schema:
                    $ref: '#/components/schemas/Error'
            'default': 
              description: Что-то пошло не так
              content:
                application/json: 
                  schema:
                    $ref: '#/components/schemas/Error'
        delete:
          summary: Удалить друга пользователя
          tags:
            - Friends
          operationId: deleteFriend
          parameters: 
           - name: user_id
             in: path
             required: true
             description: Идентификатор пользователя
             schema:
                type: string
                format: uuid
                example: 7f3c2d9e-8b41-4f6a-a2c7-5e91d8b4c3f0
           - name: friend_id
             in: path
             required: true
             description: Indentification friends 
             schema:
                type: string
                format: uuid
                example: 7f3c2d9e-8b41-4f6a-a2c7-5e91d8b4c3f0
          responses:
            '204':
                description: Друг успешно удалён
                content:
                    application/json: 
                      schema: {}
            'default': 
              description: Что-то пошло не так при удалении друга
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/Error'
    /posts:
        get:
         summary: Показать все посты
         tags:
            - Posts
         parameters:
              - name: limit
                description: Количество постов
                in: query
                schema:
                    type: integer
                    default: 20
              - name: cursor
                description: Указатель на последний пост
                in: query
                required: false
                schema:
                  type: string    
                  format: uuid
         responses: 
            '200': 
                description: Посты получены
                content: 
                    application/json: 
                      schema:
                        $ref: '#/components/schemas/PostsResponse' 
            'default': 
              description: Что-то пошло не так 
              content: 
                application/json: 
                  schema: 
                    $ref: '#/components/schemas/Error' 
        
    
components:
  schemas:
    User:
      type: object
      required:
        - name
        - surname
        - email
      properties:
        user_id:
          type: string
          format: uuid
          example: 7f3c2d9e-8b41-4f6a-a2c7-5e91d8b4c3f0

        name:
          type: string
          example: Egor

        surname:
          type: string
          example: Shevchuk
        
        email: 
          type: string
          example: egzshv@gmail.com
        
        status:
          type: string
          example: active
          enum:
            - active
            - inactive
          description: Сетевое состояние пользователя

        friends:
          $ref: '#/components/schemas/Friends'

        created_at:
          type: string
          format: date-time
          example: "2022-07-01T15:00:00+01:00"

    Users:
      type: array
      items: 
        $ref: '#/components/schemas/User'

    FriendReference:
      type: object
      required: 
        - user_id
      properties:
        user_id:
          type: string
          format: uuid

    FriendStatus:
        type: object
        required: 
            - isFriend
        properties:
          isFriend: 
            type: boolean 

    Friends:
      type: array
      items:
        $ref: '#/components/schemas/FriendReference'

    PostsResponse:
        type: object
        properties: 
          posts:
            type: array
            items: 
              $ref: '#/components/schemas/Post'
          nextCursor:             
            type: string
            format: uuid
            nullable: true

    Post:
        type: object
        required: 
          - post_id
          - message
        properties: 
          post_id:
            type: string
            format: uuid
          user_id:
            type: string
            format: uuid  
          massage:
            type: string
          mediaFile:
            $ref: '#/components/schemas/MediaFiles'

    MediaFileRequest:
        type: object
        required:
          - name
          - content
        properties: 
          name: 
            type: string
          content:
            type: string  

    MediaFileResponse:
        type: object
        required: 
          - mediaFileId
          - url
        properties:
            mediaFileId:
                type: string
                format: uuid
            url:
                type: string
                example: https://cdn.site.com/posts/123/a82fd.webp
        nullable: true

    MediaFiles:
        type: array
        items: 
          $ref: '#/components/schemas/MediaFileResponse'

    Chats:
        type: array
        items:
          $ref: '#/components/schemas/Chat'    
    Chat:
        type: object
        required: 
          - companion
        properties: 
          chat_id:
            type: string
            format: uuid
            nullable: true
          companion:
            type: string
            format: uuid
          massages:
            items:
                $ref: '#/components/schemas/MessageByChat'
        nullable: true

    ChatStatus:
        type: object
        required: 
            - isChatExist
        properties:
          isChatExist: 
            type: boolean             

    ChatCreateRequest:
        type: object
        required: 
          - companion
          - first_massages
        properties: 
          companion:
            type: string
            format: uuid
          first_massages:
            $ref: '#/components/schemas/MessageByChat'
        nullable: true

    MassageByChatRequest:
      type: object
      required:
        - massage
      properties:
        massage:
          type: string


    MessageByChat:
        type: object
        required:
            - chat_id
            - massage
        properties: 
          user_id: 
            type: string
          massage:
            type: string
          chat_id:
            type: string   
        nullable: true    
        
    Error:
        type: object 
        required: 
          - code 
          - message 
        properties: 
          code: 
            type: integer 
            example: 400 
            enum: 
              - 400 
              - 403 
              - 404 
              - 401 
              - 405 
              - 500 
              - 501 
          message: 
            type: string 
            example: че такой кислый? 
        

